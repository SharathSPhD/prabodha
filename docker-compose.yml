# Run on the DGX Spark: docker compose run l1
services:
  l1:
    build: .
    image: prabodha/gb10:0.1
    gpus: all
    # Host PID namespace: gpu_guard's pgrep must see co-resident trainers (PSALM/prabhasa)
    # or the gate falsely records contention=none (R5 honesty; HANDOFF §3 "don't pretend isolation").
    pid: host
    # bandwidth-bound courtesy caps (TRIZ C3 / shared mode):
    mem_limit: 48g
    cpus: "10"
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/workspace/hf_cache
      - ./outputs:/workspace/prabodha/outputs
      - ./gates:/workspace/prabodha/gates
      - ./research:/workspace/prabodha/research
    command: ["scripts/dispatch/l1/run.sh"]
