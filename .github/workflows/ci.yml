name: ci
on: [push, pull_request]
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - run: pip install -e .[dev]
      - run: ruff check src tests
      - run: pytest -m "not smoke"
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.10"}
      - run: pip install -e .[dev] && pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install transformers
      - run: pip install -e vendor/jacobian-lens
      - run: pytest -m smoke
