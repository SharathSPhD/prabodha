name: Deploy Astro site to GitHub Pages

on:
  # Manually trigger via workflow_dispatch
  workflow_dispatch:
  # OR trigger on push to main (optional — commented out for now)
  # push:
  #   branches: [main]
  #   paths:
  #     - 'site/**'
  #     - 'gates/**'
  #     - 'apps/web/public/data/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  BUILD_PATH: './site'

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: cd site && npm install --no-audit --no-fund

      - name: Build site (includes data extraction from gates/)
        run: cd site && npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site/dist'

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
