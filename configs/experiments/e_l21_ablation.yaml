# E_L21_ABLATION: Timing and autonomy budget ablation.
# Lineage: L21 contract §4; tau/autonomy sensitivity analysis.
# Registered BEFORE any ablation run.
#
# Hypothesis: Steering effectiveness varies with timing (tau percentile) and autonomy budget.

loop: L21
experiment: ablation
corpus: advbench_subset
model: qwen3-4b-instruct
seeds: [42, 123, 777]
write_layer: 20
max_new_tokens: 40
min_gap: 2

# Grid sweep: tau_percentile x autonomy_budget
tau_percentile_sweep: [40, 60, 80]
alpha_sweep: [0.1, 0.3, 0.5]

# Arms: baseline, entropy_gated (swept parameters)
arms:
  - baseline
  - entropy_gated

concepts: [fire, water, music]
stubs:
  - "The weather today is"
  - "My favourite food is"

# Pre-registered criteria (L21 contract §4):
# PASS if:
#   - CSR response is unimodal or monotonic (no chaotic interaction)
#   - Effect size (Hedges' g) >= 0.2 for at least one (tau, budget) pair
#   - Optimal tau is consistent across seeds
# FAIL if:
#   - Interaction is chaotic (CSR scatters wildly across conditions)
#   - No reproducible optima across seeds (overdetermined by noise)

criteria:
  min_effect_size: 0.2
  monotonicity_required: true

hypotheses:
  H_tau_response_unimodal: {metric: csr_vs_tau, unimodal: true}
  H_alpha_response_monotonic: {metric: csr_vs_alpha, monotonic: true}
  H_tau_consistency: {metric: optimal_tau_seeds, consistency_threshold: 1}

deviations:
  - "Grid sweep requires many runs (3 tau × 3 alpha × 3 seeds = 27 runs); potential contention on GB10."
  - "Unimodality is a soft expectation; slight non-monotonicity may reflect noise rather than structure."
  - "Optimal tau may be model/corpus-specific; generalization beyond this test set untested."

budget_gpu_hours: 0.6
