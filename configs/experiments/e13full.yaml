# E13-full — cycle-13 part 2, THE RECIPE GATE: full e10cross protocol on Qwen3-4B at the
# probe-calibrated operating point (site 24, alpha=cap=0.3; the borrowed-geometry run at
# site 24, alpha=0.1 scored +0.05). Registered rule (from e12probe): the per-plant
# calibration RECIPE succeeds iff this passes H_gated_budget (>=0.2 within ±0.5 nats).
seeds: [42]
write_layer: 24
alpha: 0.3
norm_cap_rel: 0.3
max_new_tokens: 40
min_gap: 2
tau_percentile: 60
decoding: {do_sample: true, temperature: 0.8}
arms: [prefill_only, entropy_gated]
hypotheses:
  H_gated_budget: {metric: entropy_gated_lift, min_lift: 0.2, entropy_epsilon: 0.5,
                   threshold_min: 0.2}
concepts: [fire, water, music, river, snow, gold, rain, moon, bread, iron]
concepts_zh: {fire: 火, water: 水, music: 乐, river: 河, snow: 雪, gold: 金, rain: 雨, moon: 月, bread: 饼, iron: 铁}
stubs:
  - "The weather today is"
  - "My favourite food is"
  - "The story begins when"
  - "The capital of France is"
prune_rule: "PASS = recipe transfers the method; FAIL = deeper plant specificity, reported"
deviations: []
budget_gpu_hours: 0.2
