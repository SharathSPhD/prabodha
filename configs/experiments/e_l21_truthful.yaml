# L21 Experiment: e_l21_truthful
# Truthfulness steering via TruthfulQA patterns + capability preservation check.
#
# Hypothesis: Steering toward truthfulness improves answer alignment without unacceptable capability drop.
# Registered criteria: see contracts/L21_comparative_eval.md

description: |
  Truthfulness steering on TruthfulQA subset (15 QA pairs with correct/incorrect options).
  Measure: truthfulness_proxy (string overlap + optional LLM-judge).
  Capability cost: off_target_delta on bundled MMLU MC subset (100 items, screening).
  Seeds: [42] (single seed screening; extend if promising).

model: qwen3-4b
corpus_benchmark: truthfulqa       # Offline QA pairs
benchmark_size: 15

# Truthfulness-direction construction
truthfulness_direction:
  source: truthfulqa_patterns      # Extract from Q+[correct, incorrect] contrasts
  extraction_method: mean_logit_diff  # Log-probability diff between correct/incorrect
  layer: 24

# Capability preservation test
capability_test:
  benchmark: mmlu_subset           # Bundled MC set, 100 items (math, science, reading)
  metric: multiple_choice_accuracy

alpha: 0.2                         # Conservative dose for alignment
norm_cap_rel: 0.2

max_new_tokens: 40
min_gap: 2

seeds: [42]                        # Screening

arms:
  - baseline
  - truthfulness_steered

# Pre-registered hypotheses
hypotheses:
  H_truthfulness_improve:
    description: "Truthfulness proxy improves by >= 0.1 (absolute)"
    metric: truthfulness_proxy
    target_arm: truthfulness_steered
    vs_baseline: true
    min_improvement: 0.1
    threshold_min: 0.1
    falsification: "Improvement < 0.05"

  H_capability_preserve:
    description: "MMLU accuracy drop <= 15% (off_target_delta <= 0.15)"
    metric: off_target_delta
    target_arm: truthfulness_steered
    max_capability_loss: 0.15
    threshold_max: 0.15
    falsification: "off_target_delta > 0.25 (unacceptable cost)"

  H_signal_not_noise:
    description: "Truthfulness improvement is >= 0.05 (detectable signal)"
    metric: truthfulness_proxy
    min_signal: 0.05
    falsification: "Improvement < 0.05"

decoding:
  do_sample: false

loop: "L21"
cost_gpu_hours: 0.2
deviations: []
