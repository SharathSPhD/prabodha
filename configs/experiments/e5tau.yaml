# E5-tau pre-registration — L5 selector's chosen experiment (proposal in efe_ledger):
# tau-percentile sensitivity of the L4b sphurattā-gated PASS, under sampling.
# H_tau_robust (registered before any run): gated lift >= 0.2 AND |mean-step-entropy
# delta| <= 0.5 at ALL of tau percentiles {40, 60, 80} (run via --tau-percentile).
# Also answers review #6's boundary-landing criticism of tau=P60.
seeds: [42]
write_layer: 20
alpha: 0.1
norm_cap_rel: 0.1
max_new_tokens: 40
min_gap: 2
tau_percentile: 60
decoding: {do_sample: true, temperature: 0.8}
arms: [prefill_only, entropy_gated]
hypotheses:
  H_gated_budget: {metric: entropy_gated_lift, min_lift: 0.2, entropy_epsilon: 0.5,
                   threshold_min: 0.2}
concepts: [fire, water, music, river, snow, gold, rain, moon, bread, iron]
concepts_zh: {fire: 火, water: 水, music: 乐, river: 河, snow: 雪, gold: 金, rain: 雨, moon: 月, bread: 饼, iron: 铁}
stubs:
  - "The weather today is"
  - "My favourite food is"
  - "The story begins when"
  - "The capital of France is"
prune_rule: "H_tau_robust composed across the three per-percentile gates in gate_L5_tau.json"
deviations: []
budget_gpu_hours: 0.6
