# GPU policy v2 — GB10 SHARED MODE (operator instruction 2026-07-07 sublates idle-only v1; see journal).
# TRIZ C3 still applies: share courteously, measure contention, never silently degrade prabhasa.
device: gb10
mode: shared                       # v1 was idle-only; sublated by operator instruction
trainer_patterns: ["train_130m", "psalm", "PSALM"]
min_free_mem_gib: 24               # refuse if less free unified memory than this
smoke_max_minutes: 5
kill_switch_file: research/KILL_SWITCH
budgets_hours: {L1: 2.0, L2: 4.0, L3: 8.0}
shared_mode:
  nice: 10                         # CPU niceness for our processes
  report_contention: true          # gate JSON must record co-resident procs + tok/s if measurable
  max_burst_minutes: 30            # pulsed bursts w/ checkpoint-resume (P18)
precision: bf16                    # FP8 unsupported on sm_121
